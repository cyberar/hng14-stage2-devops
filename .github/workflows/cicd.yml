name: CI/CD Pipeline for HNG Stage 2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # stage 1: Lint: Run linters on all code to catch syntax and style issues early.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Linters
        run: pip install flake8

      - name: Run Flake8 (Python)
        run: flake8 api/ worker/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JavaScript Linters
        run: npm install -g eslint

      - name: Run ESLint (JavaScript)
        run: eslint frontend/ || true # Ignore if no js files yet, fails on errors if they exist

      - name: Run Hadolint (Dockerfiles)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: warning
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: warning
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

  # stage 2: Test: Run unit tests with coverage reporting to ensure code quality and catch regressions.
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Unit Tests with Coverage
        run: |
          cd api
          pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # stage 3: Build: Build Docker images for all services and push to local registry for testing.
  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and Push to Local Registry
        run: |
          SHA=${{ github.sha }}
          
          # Build API
          docker build -t localhost:5000/api:$SHA -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:$SHA
          docker push localhost:5000/api:latest
          
          # Build Worker
          docker build -t localhost:5000/worker:$SHA -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:$SHA
          docker push localhost:5000/worker:latest
          
          # Build Frontend
          docker build -t localhost:5000/frontend:$SHA -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:$SHA
          docker push localhost:5000/frontend:latest

      - name: Save Images as Tarball
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest
          docker save localhost:5000/api:latest localhost:5000/worker:latest localhost:5000/frontend:latest -o images.tar

      - name: Upload Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images.tar

  # stage 4: Security Scan: Use Trivy to scan built images for vulnerabilities, failing the pipeline if critical issues are found.
  security_scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Images Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Images
        run: docker load -i images.tar

      - name: Install Trivy
        run: |
          wget -qO - https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.1

      - name: Scan Images (Fail on CRITICAL)
        run: |
          # Trivy scans multiple images. Fails (exit 1) if CRITICAL is found.
          trivy image --exit-code 1 --severity CRITICAL --format sarif -o trivy-results.sarif \
          localhost:5000/api:latest \
          localhost:5000/worker:latest \
          localhost:5000/frontend:latest

      - name: Upload Trivy SARIF Artifact
        uses: actions/upload-artifact@v4
        if: always() # Upload even if pipeline fails to view in Actions UI
        with:
          name: trivy-sarif
          path: trivy-results.sarif

  # stage 5: Integration Test: Deploy the full stack using docker-compose, run end-to-end tests against the live environment, and tear down the stack.
  integration_test:
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Images Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Images
        run: docker load -i images.tar

      - name: Tag images for Compose
        run: |
          # Retag local registry images to match what docker-compose expects
          docker tag localhost:5000/api:latest api:latest
          docker tag localhost:5000/worker:latest worker:latest
          docker tag localhost:5000/frontend:latest frontend:latest

      - name: Create Compose Override for Integration
        run: |
          # Create an override to prevent compose from trying to build
          cat <<EOF > docker-compose.override.yml
          services:
            api:
              image: api:latest
              build: !reset null
            worker:
              image: worker:latest
              build: !reset null
            frontend:
              image: frontend:latest
              build: !reset null
          EOF

      - name: Start Full Stack
        run: docker compose up -d

      - name: Wait for Stack to be Healthy
        run: |
          echo "Waiting for containers to be healthy..."
          timeout 60s bash -c 'until docker ps | grep -q "healthy"; do sleep 2; done' || (docker compose logs && exit 1)

      - name: Submit Job Through Frontend
        run: |
          # Hits Nginx (port 80), which reverse proxies to the API
          RESPONSE=$(curl -s -X POST http://localhost/jobs)
          echo "Submit Response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll Until Completed
        run: |
          TIMEOUT=30
          while [ $TIMEOUT -gt 0 ]; do
            STATUS=$(curl -s http://localhost/jobs/$JOB_ID | jq -r '.status')
            echo "Current Status: $STATUS"
            if [ "$STATUS" == "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
            ((TIMEOUT-=2))
          done
          echo "Timed out waiting for job"
          exit 1

      - name: Tear Down Stack
        if: always() # Ensures teardown runs even if previous steps fail
        run: docker compose down -v

  # stage 6: Deploy: If all tests pass and we're on the main branch, perform a scripted rolling update by deploying new containers, monitoring their health, and swapping them in place of the old ones without downtime.
  deploy:
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Images Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Images
        run: docker load -i images.tar

      - name: Scripted Rolling Update
        run: |
          IMAGE="localhost:5000/api:latest"
          OLD_CONTAINER="api_old"
          NEW_CONTAINER="api_new"
          
          # Ensure old container exists for the first run mockup
          docker run -d --name $OLD_CONTAINER --network host $IMAGE || true
          
          echo "Starting new container..."
          docker run -d --name $NEW_CONTAINER --network host $IMAGE
          
          echo "Monitoring health check (Timeout: 60s)..."
          STATUS="unhealthy"
          SECONDS_WAITED=0
          
          while [ $SECONDS_WAITED -lt 60 ]; do
            # Check Docker health status
            CURRENT_STATUS=$(docker inspect --format='{{.State.Health.Status}}' $NEW_CONTAINER 2>/dev/null || echo "starting")
            
            if [ "$CURRENT_STATUS" == "healthy" ]; then
              STATUS="healthy"
              echo "New container is healthy!"
              break
            fi
            
            echo "Status: $CURRENT_STATUS. Waiting... ($SECONDS_WAITED s)"
            sleep 5
            ((SECONDS_WAITED+=5))
          done
          
          if [ "$STATUS" != "healthy" ]; then
            echo "ABORT: Health check failed after 60 seconds."
            echo "Stopping new container and leaving old container running."
            docker stop $NEW_CONTAINER || true
            docker rm $NEW_CONTAINER || true
            exit 1
          fi
          
          echo "Rolling update successful. Swapping containers..."
          docker stop $OLD_CONTAINER || true
          docker rm $OLD_CONTAINER || true
          docker rename $NEW_CONTAINER $OLD_CONTAINER
          
          echo "Deployment complete."